<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compatibility · Edward</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0c1320;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            max-width: 560px;
            width: 100%;
            background: #141f30;
            border-radius: 40px;
            padding: 32px 28px;
            border: 1px solid #293c54;
            box-shadow: 0 25px 40px -10px #03060b;
        }
        h2 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #e1efff;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
            text-align: center;
            text-shadow: 0 2px 5px #001b40;
        }
        .field {
            margin-bottom: 24px;
        }
        .field label {
            display: block;
            color: #b0c9f0;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 8px;
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .row input, .row select {
            background: #1d2c41;
            border: 1px solid #314d6b;
            border-radius: 20px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: 0.15s;
            flex: 1 1 100px;
        }
        .row input:focus, .row select:focus {
            border-color: #5f9eff;
            box-shadow: 0 0 0 3px rgba(60, 130, 255, 0.3);
        }
        .mbti-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .mbti-tag {
            background: #1d2c41;
            border: 1px solid #314d6b;
            color: #b7d0f5;
            font-weight: 600;
            padding: 12px 12px;
            border-radius: 40px;
            flex: 1 0 auto;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: 0.1s;
            min-width: 70px;
            font-size: 0.95rem;
        }
        .mbti-tag.selected {
            background: #004a99;
            border-color: #79b0ff;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 4px 0 #002952;
        }
        .action-btn {
            width: 100%;
            background: linear-gradient(145deg, #1f3d63, #112b48);
            border: 1px solid #3f6090;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 22px 10px;
            border-radius: 60px;
            margin: 28px 0 20px 0;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 8px 0 #0a1728;
            letter-spacing: 0.5px;
        }
        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #0a1728;
        }
        .result-box {
            background: #0f1c2c;
            border-radius: 40px;
            padding: 30px 20px 20px 20px;
            text-align: center;
            border: 1px solid #2b405b;
            margin-bottom: 24px;
        }
        .big-percent {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            color: #d6e9ff;
            text-shadow: 0 5px 10px #002766;
        }
        .label-mini {
            color: #8da9d0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }
        .description-box {
            background: #1a283e;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid #364f72;
            color: #c9defa;
            font-size: 1rem;
            line-height: 1.6;
            text-align: center;
            margin: 20px 0 20px;
        }
        .description-box strong {
            color: white;
            font-weight: 700;
        }
        .footnote {
            color: #5e7ca3;
            font-size: 0.85rem;
            text-align: center;
            border-top: 1px dashed #263b52;
            padding-top: 18px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Compatibility</h2>

    <div class="field">
        <label>birth date</label>
        <div class="row">
            <input type="number" id="year" placeholder="year" min="1920" max="2025">
            <input type="number" id="month" placeholder="month" min="1" max="12">
            <input type="number" id="day" placeholder="day" min="1" max="31">
        </div>
    </div>

    <div class="field">
        <label>MBTI</label>
        <div class="mbti-grid" id="mbtiContainer">
            <div class="mbti-tag" data-mbti="INFJ">INFJ</div>
            <div class="mbti-tag" data-mbti="ENFJ">ENFJ</div>
            <div class="mbti-tag" data-mbti="INTJ">INTJ</div>
            <div class="mbti-tag" data-mbti="ISFJ">ISFJ</div>
            <div class="mbti-tag" data-mbti="ENTP">ENTP</div>
            <div class="mbti-tag" data-mbti="ESFJ">ESFJ</div>
            <div class="mbti-tag" data-mbti="INFP">INFP</div>
            <div class="mbti-tag" data-mbti="ENFP">ENFP</div>
            <div class="mbti-tag" data-mbti="ISTJ">ISTJ</div>
            <div class="mbti-tag" data-mbti="ESTJ">ESTJ</div>
            <div class="mbti-tag" data-mbti="INTP">INTP</div>
            <div class="mbti-tag" data-mbti="ENTJ">ENTJ</div>
        </div>
    </div>

    <button class="action-btn" id="checkBtn">MATCH PERCENT →</button>

    <div class="result-box" id="resultBox">
        <div class="big-percent" id="percentDisplay">—</div>
        <div class="label-mini">compatibility score</div>
    </div>

    <!-- dynamic description: why match or not with Edward -->
    <div class="description-box" id="description">
        <span id="descText">Enter a date and select MBTI, then click the button.</span>
    </div>

    <div class="footnote">
        ⚡ Powered by Edward
    </div>
</div>

<script>
    (function() {
        // ----- Edward's fixed profile (completely hidden) -----
        const EDWARD_YEAR = 2000;
        const EDWARD_MONTH = 3;    // march
        const EDWARD_DAY = 6;       // 6th
        // MBTI is ENTJ, but we never display any of these details

        // prefill default values: 1999-04-24  (as requested)
        const defaultYear = 0000;
        const defaultMonth = 00;
        const defaultDay = 00;
        const defaultMbti = 'INFJ';

        // ----- helper functions -----
        function getWesternZodiac(month, day) {
            if ((month === 3 && day >= 21) || (month === 4 && day <= 19)) return 'Aries';
            if ((month === 4 && day >= 20) || (month === 5 && day <= 20)) return 'Taurus';
            if ((month === 5 && day >= 21) || (month === 6 && day <= 20)) return 'Gemini';
            if ((month === 6 && day >= 21) || (month === 7 && day <= 22)) return 'Cancer';
            if ((month === 7 && day >= 23) || (month === 8 && day <= 22)) return 'Leo';
            if ((month === 8 && day >= 23) || (month === 9 && day <= 22)) return 'Virgo';
            if ((month === 9 && day >= 23) || (month === 10 && day <= 22)) return 'Libra';
            if ((month === 10 && day >= 23) || (month === 11 && day <= 21)) return 'Scorpio';
            if ((month === 11 && day >= 22) || (month === 12 && day <= 21)) return 'Sagittarius';
            if ((month === 12 && day >= 22) || (month === 1 && day <= 19)) return 'Capricorn';
            if ((month === 1 && day >= 20) || (month === 2 && day <= 18)) return 'Aquarius';
            return 'Pisces';
        }

        function getChineseAnimal(year) {
            const animals = ['Monkey', 'Rooster', 'Dog', 'Pig', 'Rat', 'Ox', 'Tiger', 'Rabbit', 'Dragon', 'Snake', 'Horse', 'Goat'];
            return animals[year % 12];
        }

        function getChineseElement(year) {
            const elements = ['Wood', 'Wood', 'Fire', 'Fire', 'Earth', 'Earth', 'Metal', 'Metal', 'Water', 'Water'];
            return elements[Math.floor(year / 2) % 10];
        }

        // ----- compute match percent and description (only refer to "Edward") -----
        function evaluateMatch(birthYear, birthMonth, birthDay, mbti) {
            const western = getWesternZodiac(birthMonth, birthDay);
            const chineseAnimal = getChineseAnimal(birthYear);
            const chineseElement = getChineseElement(birthYear);

            // base scores (same algorithm, but description only mentions Edward)
            const westMap = {
                'Scorpio': 10, 'Cancer': 10, 'Capricorn': 8, 'Taurus': 9, 'Virgo': 7,
                'Libra': 8, 'Pisces': 9, 'Leo': 6, 'Aries': 6, 'Gemini': 5, 'Aquarius': 5, 'Sagittarius': 5
            };
            let westScore = westMap[western] || 5;

            const dragonComp = {
                'Rooster': 10, 'Snake': 9, 'Rat': 8, 'Ox': 9, 'Monkey': 9, 'Rabbit': 7,
                'Dragon': 7, 'Tiger': 7, 'Goat': 6, 'Horse': 6, 'Dog': 7, 'Pig': 6
            };
            let chineseScore = dragonComp[chineseAnimal] || 6;

            if (chineseElement === 'Earth') chineseScore += 2;
            else if (chineseElement === 'Metal') chineseScore += 1;
            else if (chineseElement === 'Water') chineseScore += 1;
            else if (chineseElement === 'Fire') chineseScore -= 1;
            chineseScore = Math.min(10, Math.max(3, chineseScore));

            const mbtiComp = {
                'INFJ': 10, 'ENFJ': 9, 'INTJ': 9, 'ISFJ': 8, 'ENTP': 8, 'ESFJ': 7,
                'INFP': 6, 'ENFP': 7, 'ISTJ': 7, 'ESTJ': 7, 'INTP': 7, 'ENTJ': 7,
                'ISTP': 5, 'ESTP': 6, 'ISFP': 6, 'ESFP': 5
            };
            let mbtiScore = mbtiComp[mbti] || 5;

            // age relative to Edward (26 in 2026)
            const edwardAge = 26;
            const otherAge = 2026 - birthYear;
            const ageDiff = otherAge - edwardAge;
            let ageBonus = 0;
            if (ageDiff >= -5 && ageDiff <= 3) ageBonus = 2;
            else if (ageDiff < -5) ageBonus = -3;
            else ageBonus = -5;

            let raw = (westScore * 3.5) + (chineseScore * 3) + (mbtiScore * 3.5) + ageBonus;
            let percent = Math.min(100, Math.max(20, Math.round(raw)));

            // special top combos (used for description, but we only say "Edward")
            const isTop1 = (western === 'Scorpio' && chineseAnimal === 'Rooster' && mbti === 'INFJ' && birthYear === 2005);
            const isTop2 = (western === 'Cancer' && chineseAnimal === 'Rat' && mbti === 'ENFJ' && birthYear === 1996);
            const isTop3 = (western === 'Capricorn' && chineseAnimal === 'Ox' && (birthYear === 1997 || birthYear === 1998) && mbti === 'INTJ');
            const isTop4 = (western === 'Taurus' && chineseAnimal === 'Snake' && birthYear === 1999 && mbti === 'INTJ');
            const isTop5 = (western === 'Taurus' && chineseAnimal === 'Snake' && birthYear === 2001 && mbti === 'INTJ');
            const isTop6 = (western === 'Virgo' && chineseAnimal === 'Monkey' && birthYear === 2004 && mbti === 'ENTP');

            if (isTop1) percent = 100;
            else if (isTop2) percent = 97;
            else if (isTop3) percent = 94;
            else if (isTop4 || isTop5) percent = 93;
            else if (isTop6) percent = 92;

            // generate description (only mention Edward, no zodiac details)
            let description = '';
            if (percent >= 90) {
                description = `<strong>✅ High compatibility with Edward.</strong> `;
                if (isTop4) description += `You match a top-tier profile that Edward resonates with deeply. Grounded, loyal, and quietly intuitive — your energy complements his.`;
                else if (isTop5) description += `You align with one of Edward's ideal matches. Sensual and devoted, you bring stability to his vision.`;
                else if (isTop2) description += `You reflect a profile Edward connects with on a profound emotional level. Nurturing and charismatic, you create a safe harbour.`;
                else if (isTop3) description += `You match a strategic, empire‑builder profile. Edward respects your ambition and unshakable loyalty.`;
                else if (isTop6) description += `You share an intellectual spark with Edward. Playful and stimulating, you keep the connection exciting.`;
                else if (isTop1) description += `You are Edward’s ultimate soulmate profile. Intense, intuitive, and deeply loyal — a once‑in‑a‑lifetime bond.`;
                else description += `Your overall energy aligns very well with Edward’s nature.`;
            } else if (percent >= 70) {
                description = `<strong>⚠️ Moderate compatibility with Edward.</strong> Some qualities resonate, but there are noticeable differences. Attraction exists, but deeper harmony may require effort.`;
            } else {
                description = `<strong>❌ Not a strong match with Edward.</strong> The combination differs significantly from what he vibes with. Core elements may feel mismatched.`;
            }

            return { percent, description };
        }

        // ----- UI elements -----
        const yearInput = document.getElementById('year');
        const monthInput = document.getElementById('month');
        const dayInput = document.getElementById('day');
        const mbtiTags = document.querySelectorAll('.mbti-tag');
        const checkBtn = document.getElementById('checkBtn');
        const percentDisplay = document.getElementById('percentDisplay');
        const descText = document.getElementById('descText');

        let selectedMbti = defaultMbti;

        // set default date values
        yearInput.value = defaultYear;
        monthInput.value = defaultMonth;
        dayInput.value = defaultDay;

        // highlight default MBTI (ISFJ)
        mbtiTags.forEach(tag => {
            if (tag.dataset.mbti === defaultMbti) tag.classList.add('selected');
            tag.addEventListener('click', () => {
                mbtiTags.forEach(t => t.classList.remove('selected'));
                tag.classList.add('selected');
                selectedMbti = tag.dataset.mbti;
            });
        });

        function updateMatch() {
            const year = parseInt(yearInput.value);
            const month = parseInt(monthInput.value);
            const day = parseInt(dayInput.value);
            if (isNaN(year) || isNaN(month) || isNaN(day) || month < 1 || month > 12 || day < 1 || day > 31) {
                percentDisplay.innerText = '??';
                descText.innerHTML = 'Invalid date.';
                return;
            }
            const { percent, description } = evaluateMatch(year, month, day, selectedMbti);
            percentDisplay.innerText = percent + '%';
            descText.innerHTML = description;
        }

        checkBtn.addEventListener('click', updateMatch);

        // automatically trigger on page load to show default (1999-04-24 / ISFJ)
        window.addEventListener('load', () => {
            // ensure correct MBTI selected (ISFJ)
            mbtiTags.forEach(t => t.classList.remove('selected'));
            document.querySelector('.mbti-tag[data-mbti="ISFJ"]').classList.add('selected');
            selectedMbti = 'ISFJ';
            updateMatch();
        });

    })();
</script>
</body>
</html>
